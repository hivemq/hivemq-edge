dataCombiners:
  - name: ExtruderStatus
    description: "Combines extruder sensor readings into a unified status payload"
    mappings:
      - name: NozzleTrigger
        description: "Triggered by nozzle pressure; merges barrel temp and ambient temp"
        trigger:
          tag: extruder-01::NozzlePressure
        output:
          topic: factory/berlin/assets/extruder-status
          qos: 1
        instructions:
          - source:
              tag: extruder-01::NozzlePressure
              field: "$.value"
            destination:
              field: "$.pressure"
          - source:
              tag: extruder-01::BarrelTemp
              field: "$.value"
            destination:
              field: "$.temperature"
          - source:
              topic: "sensors/hvac/zone/+"
              field: "$.zoneTemp"
            destination:
              field: "$.ambientTemp"
