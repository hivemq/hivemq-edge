name: Frontend - React Testing Pyramid

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: false

defaults:
  run:
    working-directory: ./hivemq-edge-frontend/

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: 👓 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🏗️ Setup node environment
        uses: ./.github/actions/setup_node
        with:
          working-directory: ./hivemq-edge-frontend/

      - name: 🧪 Run Prettier
        run: pnpm lint:prettier

      - name: 🧪 Run ESLint
        run: pnpm lint:eslint

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: 👓 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🏗️ Setup node environment
        uses: ./.github/actions/setup_node
        with:
          working-directory: ./hivemq-edge-frontend/

      - name: 🧪 Run Test
        run: pnpm test:coverage

      - name: 💾 Upload Vitest Code Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lcov-vitest
          path: hivemq-edge-frontend/coverage-vitest/lcov.info
          if-no-files-found: ignore
          retention-days: 1

  build_instrumented:
    name: Build Instrumented (for E2E coverage)
    runs-on: ubuntu-latest
    steps:
      - name: 👓 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🏗️ Setup node environment
        uses: ./.github/actions/setup_node
        with:
          working-directory: ./hivemq-edge-frontend/

      - name: 🏗️ Build Application with Coverage
        ## Increased to 8GB: TypeScript compiler (~1.3MB) + Istanbul instrumentation requires significant memory
        ## Previous 4GB limit still caused OOM errors in CI environment
        run: NODE_OPTIONS="--max_old_space_size=8192" pnpm run build --base=/
        env:
          VITE_COVERAGE: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: application-instrumented
          path: ./hivemq-edge-frontend/dist
          retention-days: 1

  build_production:
    name: Build Production (clean)
    runs-on: ubuntu-latest
    steps:
      - name: 👓 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🏗️ Setup node environment
        uses: ./.github/actions/setup_node
        with:
          working-directory: ./hivemq-edge-frontend/

      - name: 🏗️ Build Application
        run: pnpm run build --base=/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: application-clean
          path: ./hivemq-edge-frontend/dist
          retention-days: 1

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: [ build_production ]
    steps:
      - name: 👓 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: application-clean
          path: ./hivemq-edge-frontend/dist

      - name: 🚥 Run Lighthouse audits
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        id: lighthouse
        with:
          temporaryPublicStorage: true # upload lighthouse report to the temporary storage
          ## budgetPath: ./budget.json # test performance budgets
          uploadArtifacts: true # save results as an action artifacts
          configPath: 'hivemq-edge-frontend/.lighthouserc.cjs'

  cypress_matrix:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [ build_instrumented ]
    strategy:
      matrix:
        cypress: [
          # E2E split into 3 jobs
          { component: false, spec: './cypress/e2e/adapters/**/*', target: 'E2E-Adapters' },
          { component: false, spec: './cypress/e2e/workspace/**/*', target: 'E2E-Workspace' },
          { component: false, spec: './cypress/e2e/!(adapters|workspace)/**/*', target: 'E2E-Core' },

          # All components
          { component: true, spec: "./src/components/**/*", target: "Components" },

          # Extensions (Datahub)
          { component: true, spec: "./src/extensions/**/*", target: "Extensions" },

          # Modules split into 4 jobs
          { component: true, spec: "./src/modules/Workspace/**/*", target: "Workspace" },
          { component: true, spec: "./src/modules/Mappings/**/*", target: "Mappings" },
          { component: true, spec: "./src/modules/Pulse/**/*", target: "Pulse" },
          { component: true, spec: "./src/modules/!(Workspace|Mappings|Pulse)/**/*", target: "Modules" }
        ]
    name: Cypress - ${{ matrix.cypress.target }}
    steps:
      - name: 👓 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🏗️ Setup node environment
        uses: ./.github/actions/setup_node
        with:
          working-directory: ./hivemq-edge-frontend/
          run-install: true

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: application-instrumented
          path: ./hivemq-edge-frontend/dist

      - name: 🧪 Run Cypress suite
        uses: cypress-io/github-action@v6
        with:
          component: ${{ matrix.cypress.component }}
          spec: ${{ matrix.cypress.spec }}
          start: pnpm preview --port 3000
          working-directory: ./hivemq-edge-frontend/
          quiet: true

      # after the test, store videos
      - name: 💾 Upload Cypress - ${{ matrix.cypress.target }} videos
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cypress-${{ matrix.cypress.target }}-videos
          path: hivemq-edge-frontend/cypress/videos
          if-no-files-found: ignore
          retention-days: 1

      - name: 💾 Upload Cypress Code Coverage
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lcov-cypress-${{ matrix.cypress.target }}
          path: hivemq-edge-frontend/coverage-cypress/lcov.info
          if-no-files-found: ignore
          retention-days: 1

  sonarqube:
    name: SonarQube
    needs: [ cypress_matrix, unit_tests ]
    # Should we collect partial test results and combine them ?
    if: success() || failure()
    runs-on: ubuntu-latest
    steps:
      - name: 👓 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download all LCOV Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: hivemq-edge-frontend/coverage-combined
          pattern: lcov-*
          merge-multiple: false
      - name: Verify LCOV Artifacts
        # Should contain the lcov.info summary, in subdirectory named from the tasks
        run: |
          ls -R ./coverage-combined
          ls -R **/**/*.info
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        with:
          projectBaseDir: hivemq-edge-frontend
          args: >
            -Dsonar.verbose=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

