name: CI Check

on:
  workflow_call:

permissions:
  contents: read
  packages: read      # read hivemq-data-hub / hivemq-commons artifacts from GitHub Packages
  checks: write        # publish-unit-test-result-action creates a check run
  pull-requests: write # jacoco-report / test-results post a PR comment

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Checkout Extension SDK
        run: |
          git clone https://github.com/hivemq/hivemq-extension-sdk.git ../hivemq-extension-sdk
          cd ../hivemq-extension-sdk
          git checkout ${{ github.head_ref }} || true
          git clone https://github.com/hivemq/hivemq-edge-extension-sdk.git ../hivemq-edge-extension-sdk
          cd ../hivemq-edge-extension-sdk
          git checkout ${{ github.head_ref }} || true
          git clone https://github.com/hivemq/hivemq-edge-adapter-sdk.git ../hivemq-edge-adapter-sdk
          cd ../hivemq-edge-adapter-sdk
          git checkout ${{ github.head_ref }} || true
          cd ../hivemq-edge

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'adopt'
          java-version: '21'

      - uses: burrunan/gradle-cache-action@4b67497abd37a511d6c1dc6299bdd84ff39f7bf5 # v3.0.2
        name: Build container
        with:
          arguments: :test :hivemq-edge:forbiddenApis :hivemqEdgeZip :jacocoMergedReport
          gradle-version: wrapper
        env:
          # an authenticated GITHUB_TOKEN with packages:read can read the
          # hivemq-data-hub / hivemq-commons GitHub Packages Maven artifacts
          # cross-repo, so no managed PAT/secret is required here.
          ORG_GRADLE_PROJECT_hivemqCommonsUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_hivemqCommonsPassword: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@f3a4c8ee80460c780d2932e55fb914138ecaca2c
        with:
          files: |
            ${{ github.workspace }}/**/build/test-results/**/*.xml

      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: |
            ${{ github.workspace }}/**/build/reports/jacoco/jacocoMergedReport/jacocoMergedReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60
          title: Coverage Report
          update-comment: true
          pass-emoji: ✅
          fail-emoji: ❌
          debug-mode: true

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-java
          path: build/reports/jacoco/jacocoMergedReport/html
          retention-days: 1
