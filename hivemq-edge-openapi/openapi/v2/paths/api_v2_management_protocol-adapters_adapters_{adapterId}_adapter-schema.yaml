get:
  description: >-
    Obtain the JSON-Schema projection of a v2 adapter type's adapter-configuration schema (the reused
    adapter Schema).
  operationId: getAdapterSchema
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/JsonNode.yaml
      description: Success
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/errors/AdapterTypeNotFoundError.yaml
      description: Adapter type schema not available
  summary: Obtain a v2 adapter's configuration schema
  tags:
    - Protocol Adapters
