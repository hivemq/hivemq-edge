get:
  description: List a Nevsky (v2) adapter's northbound mappings with their derived runtime status.
  operationId: getNorthboundMappings
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Mapping.yaml
      description: Success
    '404':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/ProblemDetails.yaml
      description: Adapter not found
  summary: List a Nevsky adapter's northbound mappings
  tags:
    - Protocol Adapters
