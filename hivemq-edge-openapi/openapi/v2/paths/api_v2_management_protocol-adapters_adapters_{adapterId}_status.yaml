get:
  description: Obtain the runtime status of a Nevsky (v2) adapter (machine state, color, and tag summary).
  operationId: getAdapterStatus
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AdapterStatus.yaml
      description: Success
    '404':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/ProblemDetails.yaml
      description: Adapter not found
  summary: Obtain a Nevsky adapter's runtime status
  tags:
    - Protocol Adapters
