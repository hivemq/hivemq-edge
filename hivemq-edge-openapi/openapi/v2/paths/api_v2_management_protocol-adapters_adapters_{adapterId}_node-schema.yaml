get:
  description: >-
    Obtain the JSON-Schema projection of a Nevsky (v2) adapter type's node-definition schema (the reused
    adapter Schema).
  operationId: getNodeSchema
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/JsonNode.yaml
      description: Success
    '404':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/ProblemDetails.yaml
      description: Adapter not found
  summary: Obtain a Nevsky adapter's node-definition schema
  tags:
    - Protocol Adapters
