get:
  description: Obtain the status and per-aspect detail of one tag of a v2 adapter.
  operationId: getTagStatus
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
    - description: The tag name.
      in: path
      name: tagName
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TagStatusDetail.yaml
      description: Success
    '404':
      content:
        application/problem+json:
          schema:
            oneOf:
              - $ref: ../components/schemas/errors/AdapterNotFoundError.yaml
              - $ref: ../components/schemas/errors/TagNotFoundError.yaml
            discriminator:
              propertyName: type
              mapping:
                https://hivemq.com/edge/api/v2/model/AdapterNotFoundError: "../components/schemas/errors/AdapterNotFoundError.yaml"
                https://hivemq.com/edge/api/v2/model/TagNotFoundError: "../components/schemas/errors/TagNotFoundError.yaml"
      description: Adapter or tag not found
  summary: Obtain a tag's status and per-aspect detail
  tags:
    - Protocol Adapters
