get:
  description: Obtain the status and per-aspect detail of one tag of a Nevsky (v2) adapter.
  operationId: getTagStatus
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
    - description: The tag name.
      in: path
      name: tagName
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TagStatusDetail.yaml
      description: Success
    '404':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/ProblemDetails.yaml
      description: Adapter or tag not found
  summary: Obtain a tag's status and per-aspect detail
  tags:
    - Protocol Adapters
