post:
  description: >-
    Activate or deactivate a direction of a Nevsky (v2) adapter. This is a live-goal command and is never
    persisted; after a restart the configuration-declared activation applies again.
  operationId: setAdapterActivation
  x-roles-allowed:
    - admin
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AdapterActivation.yaml
    description: The direction to activate or deactivate.
    required: true
  responses:
    '200':
      description: Success
    '404':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/ProblemDetails.yaml
      description: Adapter not found
  summary: Set a Nevsky adapter's direction activation
  tags:
    - Protocol Adapters
