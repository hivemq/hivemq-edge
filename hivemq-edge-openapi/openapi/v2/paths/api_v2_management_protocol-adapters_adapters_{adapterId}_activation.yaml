post:
  description: >-
    Activate or deactivate a direction of a v2 adapter. This is a live-goal command and is never
    persisted; after a restart the configuration-declared activation applies again.
  operationId: setAdapterActivation
  x-roles-allowed:
    - admin
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AdapterActivation.yaml
    description: The direction to activate or deactivate.
    required: true
  responses:
    '200':
      description: Success
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/errors/AdapterActivationInvalidError.yaml
      description: The activation request body is invalid
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/errors/AdapterNotFoundError.yaml
      description: Adapter not found
  summary: Set a v2 adapter's direction activation
  tags:
    - Protocol Adapters
