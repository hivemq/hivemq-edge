post:
  description: >-
    Bulk-retry permanently-failed tags of a Nevsky (v2) adapter (runtime-only; EDG-462). The body may list the
    tag names to retry; omit it to retry every permanently-failed tag. Never touches configuration.
  operationId: retryTags
  x-roles-allowed:
    - admin
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TagRetryRequest.yaml
    description: The tags to retry; omit to retry all permanently-failed tags.
    required: false
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TagRetryResult.yaml
      description: Success
    '404':
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/ProblemDetails.yaml
      description: Adapter not found
  summary: Bulk-retry permanently-failed tags
  tags:
    - Protocol Adapters
