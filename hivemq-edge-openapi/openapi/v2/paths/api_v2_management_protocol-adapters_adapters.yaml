get:
  description: List the Nevsky (v2) protocol adapters with their runtime status.
  operationId: listAdapters
  x-roles-allowed:
    - admin
    - super
    - user
  responses:
    '200':
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/AdapterStatus.yaml
      description: Success
  summary: List the Nevsky adapters with status
  tags:
    - Protocol Adapters
