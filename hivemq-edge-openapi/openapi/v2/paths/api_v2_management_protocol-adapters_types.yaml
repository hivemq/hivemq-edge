get:
  description: >-
    Obtain the list of registered v2 protocol adapter types. Empty in production until a real adapter
    type is ported.
  operationId: getAdapterTypes
  x-roles-allowed:
    - admin
    - super
    - user
  responses:
    '200':
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/AdapterType.yaml
      description: Success
  summary: Obtain the registered v2 adapter types
  tags:
    - Protocol Adapters
