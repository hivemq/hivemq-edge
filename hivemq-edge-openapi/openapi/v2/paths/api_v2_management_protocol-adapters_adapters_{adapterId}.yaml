get:
  description: Obtain the read-only configured definition of a Nevsky (v2) adapter.
  operationId: getAdapter
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: The adapter id.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AdapterDefinition.yaml
      description: Success
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/errors/AdapterNotFoundError.yaml
      description: Adapter not found
  summary: Obtain a Nevsky adapter's configured definition
  tags:
    - Protocol Adapters
