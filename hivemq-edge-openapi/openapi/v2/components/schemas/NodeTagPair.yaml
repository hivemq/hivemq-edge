type: object
description: >-
  A Node/Tag pair as configured, with its read-only activation flags (persisted preferences from the
  configuration section) and its derived runtime status.
required:
  - tagName
  - nodeString
properties:
  tagName:
    type: string
    description: The tag name.
  nodeString:
    type: string
    description: Opaque JSON node definition, stored as-is.
  readActivated:
    type: boolean
    readOnly: true
    description: Persisted read-aspect activation preference from the configuration section.
  writeActivated:
    type: boolean
    readOnly: true
    description: Persisted write-aspect activation preference from the configuration section.
  pollable:
    type: boolean
    readOnly: true
  subscribable:
    type: boolean
    readOnly: true
  access:
    $ref: ./AccessFlags.yaml
  schema:
    $ref: ../../../components/schemas/JsonNode.yaml
  status:
    nullable: true
    description: >-
      The tag's derived runtime status, or null when the tag is configured but not part of the running snapshot —
      the adapter is not running, or a reload added the tag but it has not yet been (or could not be) applied to
      the running adapter.
    allOf:
      - $ref: ./TagStatus.yaml
