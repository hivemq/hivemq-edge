allOf:
  - $ref: "./ApiProblemDetails.yaml"
  - type: object
    properties:
      adapterId:
        type: string
        description: The id of the adapter whose browse was interrupted.
        example: "my-adapter"
    required:
      - adapterId
example:
  general:
    status: 503
    title: "Browse Interrupted"
    detail: "The browse operation on the protocol adapter 'my-adapter' was interrupted."
    adapterId: "my-adapter"
    type: "https://hivemq.com/edge/api/v2/model/BrowseInterruptedError"
