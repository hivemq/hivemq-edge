allOf:
  - $ref: "./ApiProblemDetails.yaml"
  - type: object
    properties:
      adapterId:
        type: string
        description: The id of the adapter whose browse failed.
        example: "my-adapter"
    required:
      - adapterId
example:
  general:
    status: 500
    title: "Browse Failed"
    detail: "The browse operation on the protocol adapter 'my-adapter' failed unexpectedly."
    adapterId: "my-adapter"
    type: "https://hivemq.com/edge/api/v2/model/BrowseFailedError"
