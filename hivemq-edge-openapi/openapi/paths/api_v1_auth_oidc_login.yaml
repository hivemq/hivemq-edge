get:
  description: Begin the OIDC authorization-code flow. Redirects the browser to the configured Identity Provider's authorization endpoint with a freshly minted state, nonce, and PKCE challenge.
  operationId: oidc-login
  x-roles-allowed:
    - NO_AUTH_REQUIRED
  responses:
    '302':
      description: Redirect to the Identity Provider's authorization endpoint.
    '503':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProblemDetails.yaml
      description: OIDC is not configured or the Identity Provider is unreachable.
  summary: Begin the OIDC login flow.
  tags:
    - Authentication
    - Authentication Endpoint
