get:
  deprecated: true
  description: >-
    **Deprecated:** Use `GET
    /api/v1/management/protocol-adapters/schema/{adapterId}/{tagName}` instead.
    This endpoint now returns a 301 redirect to the replacement.
  operationId: get-writing-schema
  x-roles-allowed:
    - admin
    - super
    - user
  parameters:
    - description: >-
        The id of the adapter for which the Json Schema for writing to a PLC
        gets created.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
    - description: >-
        The tag name (urlencoded) for which the Json Schema for writing to a PLC
        gets created.
      in: path
      name: tagName
      required: true
      schema:
        type: string
        format: urlencoded
  responses:
    '301':
      description: >-
        Moved Permanently. The schema endpoint has moved to
        `/api/v1/management/protocol-adapters/schema/{adapterId}/{tagName}`.
      headers:
        Location:
          description: The new URL for this resource.
          schema:
            type: string
            format: uri
  summary: >-
    Deprecated. Redirects to the replacement schema endpoint.
  tags:
    - Protocol Adapters
