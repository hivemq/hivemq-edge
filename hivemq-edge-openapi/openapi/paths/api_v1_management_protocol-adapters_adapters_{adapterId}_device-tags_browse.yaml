post:
  description: >-
    Browse the device address space of the specified adapter and return
    discovered nodes as a downloadable file. The response format is
    determined by the Accept header (text/csv, application/json, or
    application/yaml).
  operationId: browseDeviceTags
  x-roles-allowed:
    - admin
  parameters:
    - description: The adapter ID.
      in: path
      name: adapterId
      required: true
      schema:
        type: string
    - description: Optional device-specific root identifier to start browsing from.
      in: query
      name: rootId
      required: false
      schema:
        type: string
    - description: Max browse depth (0 = unlimited).
      in: query
      name: maxDepth
      required: false
      schema:
        type: integer
        default: 0
  responses:
    '200':
      description: Success
      content:
        text/csv:
          schema:
            type: string
            format: binary
        application/json:
          schema:
            type: string
            format: binary
        application/yaml:
          schema:
            type: string
            format: binary
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProblemDetails.yaml
      description: Adapter not found
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProblemDetails.yaml
      description: Adapter does not support bulk tag browsing or browse failed
    '504':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ProblemDetails.yaml
      description: Browse timed out
  summary: Browse device tags
  tags:
    - Device Tag Browsing
