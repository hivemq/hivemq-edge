# pnpm 11 no longer reads project settings from the package.json "pnpm" field or the
# legacy ".npmrc" build-script approvals (only-built-dependencies[]). They live here now.
#
# - `overrides` must stay in sync with the `overrides` block of pnpm-lock.yaml, otherwise
#   `pnpm install --frozen-lockfile` fails with ERR_PNPM_LOCKFILE_CONFIG_MISMATCH.
# - `allowBuilds` approves the dependency build scripts we trust to run; without it
#   `pnpm install` fails with ERR_PNPM_IGNORED_BUILDS under pnpm 11.
allowBuilds:
  '@parcel/watcher': true
  '@percy/core': true
  '@sentry/cli': true
  cypress: true
  esbuild: true
  msw: true
  protobufjs: true
overrides:
  minimatch@3: 3.1.5
  minimatch@8: 8.0.7
  minimatch@9: 9.0.9
  minimatch@10: 10.2.5
  flatted: 3.4.2
  ajv@>=8 <9: ^8.20.0
  immutable: ^5.1.5
  brace-expansion@^1: ^1.1.14
  brace-expansion@^2: ^2.0.3
  lodash: ^4.18.0
  lodash-es: ^4.18.0
  picomatch@^4: ^4.0.4
  qs@^6: ^6.15.2
  rollup@^4: ^4.57.1
  dompurify@>=3 <4: ^3.4.1
  markdown-it: ^14.1.1
  postcss@^8: ^8.5.12
  yaml@^1: ^1.10.3
  yaml@^2: ^2.8.3
  follow-redirects: ^1.16.0
  ws@^8: ^8.20.1
  fast-uri@^3: ^3.1.2
  systeminformation@^5: ^5.31.6
  ip-address: ^10.1.1
  '@protobufjs/utf8': ^1.1.1
  '@protobufjs/codegen': ^2.0.5
  uuid@^11: ^11.1.1
