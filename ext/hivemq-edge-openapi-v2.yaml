openapi: 3.0.1
info:
  contact:
    url: https://www.hivemq.com
  description: |
    The Nevsky (v2) protocol-adapter REST API of HiveMQ Edge — state-only runtime views and commands (direction activation, tag retry, browse). No endpoint creates, modifies, or deletes configuration; configuration is produced by an external tool and only read by Edge.
  title: HiveMQ Edge REST API — Protocol Adapters v2
  version: 2026.11-SNAPSHOT
  x-logo:
    url: https://www.hivemq.com/img/svg/hivemq-bee.svg
tags:
  - description: 'Interact with Nevsky (v2) protocol adapters: state-only runtime views and commands (direction activation, tag retry, browse). No endpoint creates, modifies, or deletes configuration.'
    name: Protocol Adapters
paths:
  /api/v2/management/protocol-adapters/types:
    get:
      description: Obtain the list of registered Nevsky (v2) protocol adapter types. Empty in production until a real adapter type is ported.
      operationId: getAdapterTypes
      x-roles-allowed:
        - admin
        - super
        - user
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdapterType'
          description: Success
      summary: Obtain the registered Nevsky adapter types
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters:
    get:
      description: List the Nevsky (v2) protocol adapters with their runtime status.
      operationId: listAdapters
      x-roles-allowed:
        - admin
        - super
        - user
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdapterStatus'
          description: Success
      summary: List the Nevsky adapters with status
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}:
    get:
      description: Obtain the read-only configured definition of a Nevsky (v2) adapter.
      operationId: getAdapter
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterDefinition'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: Obtain a Nevsky adapter's configured definition
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/status:
    get:
      description: Obtain the runtime status of a Nevsky (v2) adapter (machine state, color, and tag summary).
      operationId: getAdapterStatus
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterStatus'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: Obtain a Nevsky adapter's runtime status
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/status:
    get:
      description: Obtain the runtime status of every Nevsky (v2) protocol adapter.
      operationId: getAdapterStatuses
      x-roles-allowed:
        - admin
        - super
        - user
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdapterStatus'
          description: Success
      summary: Obtain the status of all Nevsky adapters
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/activation:
    post:
      description: Activate or deactivate a direction of a Nevsky (v2) adapter. This is a live-goal command and is never persisted; after a restart the configuration-declared activation applies again.
      operationId: setAdapterActivation
      x-roles-allowed:
        - admin
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdapterActivation'
        description: The direction to activate or deactivate.
        required: true
      responses:
        '200':
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: Set a Nevsky adapter's direction activation
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/tags:
    get:
      description: List a Nevsky (v2) adapter's Node/Tag pairs with their activation flags and derived status.
      operationId: getAdapterTags
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NodeTagPair'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: List a Nevsky adapter's Node/Tag pairs
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/tags/{tagName}/status:
    get:
      description: Obtain the status and per-aspect detail of one tag of a Nevsky (v2) adapter.
      operationId: getTagStatus
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
        - description: The tag name.
          in: path
          name: tagName
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagStatusDetail'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter or tag not found
      summary: Obtain a tag's status and per-aspect detail
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/tags/{tagName}/retry:
    post:
      description: Retry a permanently-failed tag of a Nevsky (v2) adapter (runtime-only; EDG-462). Each aspect of the tag that is in a permanent verification failure re-verifies; aspects in any other state are skipped with a reason. Never touches configuration.
      operationId: retryTag
      x-roles-allowed:
        - admin
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
        - description: The tag name.
          in: path
          name: tagName
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagRetryResult'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter or tag not found
      summary: Retry a permanently-failed tag
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/tags/retry:
    post:
      description: Bulk-retry permanently-failed tags of a Nevsky (v2) adapter (runtime-only; EDG-462). The body may list the tag names to retry; omit it to retry every permanently-failed tag. Never touches configuration.
      operationId: retryTags
      x-roles-allowed:
        - admin
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagRetryRequest'
        description: The tags to retry; omit to retry all permanently-failed tags.
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagRetryResult'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: Bulk-retry permanently-failed tags
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/northbound-mappings:
    get:
      description: List a Nevsky (v2) adapter's northbound mappings with their derived runtime status.
      operationId: getNorthboundMappings
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mapping'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: List a Nevsky adapter's northbound mappings
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/southbound-mappings:
    get:
      description: List a Nevsky (v2) adapter's southbound mappings with their derived runtime status.
      operationId: getSouthboundMappings
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mapping'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: List a Nevsky adapter's southbound mappings
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/browse:
    post:
      description: Browse a Nevsky (v2) adapter's device address space below a filter node. The request blocks until the adapter returns the result or the request times out. Single in-flight browse per adapter.
      operationId: browseAdapter
      x-roles-allowed:
        - admin
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrowseCommand'
        description: The browse filter; omit the node to browse from the root.
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowseResult'
          description: Success
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: The adapter type does not support browsing, or the filter is invalid
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: The adapter is not connected, or a browse is already in flight
        '504':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: The adapter did not return a browse result before the timeout
      summary: Browse a Nevsky adapter's address space
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/node-schema:
    get:
      description: Obtain the JSON-Schema projection of a Nevsky (v2) adapter type's node-definition schema (the reused adapter Schema).
      operationId: getNodeSchema
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonNode'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: Obtain a Nevsky adapter's node-definition schema
      tags:
        - Protocol Adapters
  /api/v2/management/protocol-adapters/adapters/{adapterId}/adapter-schema:
    get:
      description: Obtain the JSON-Schema projection of a Nevsky (v2) adapter type's adapter-configuration schema (the reused adapter Schema).
      operationId: getAdapterSchema
      x-roles-allowed:
        - admin
        - super
        - user
      parameters:
        - description: The adapter id.
          in: path
          name: adapterId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonNode'
          description: Success
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
          description: Adapter not found
      summary: Obtain a Nevsky adapter's configuration schema
      tags:
        - Protocol Adapters
components:
  schemas:
    JsonNode:
      type: object
      description: The arguments of the fsm derived from the behavior policy.
    AdapterType:
      type: object
      description: A registered Nevsky adapter type, with its capabilities and schema projections.
      required:
        - id
      properties:
        id:
          type: string
          description: The protocol id (the type identifier).
        protocolId:
          type: string
        displayName:
          type: string
        description:
          type: string
        version:
          type: string
        logoUrl:
          type: string
        author:
          type: string
        category:
          type: string
        searchTags:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
            enum:
              - SUBSCRIPTIONS
              - WRITE
              - BROWSE
        configVersion:
          type: integer
          format: int32
        nodeSchema:
          $ref: '#/components/schemas/JsonNode'
        adapterSchema:
          $ref: '#/components/schemas/JsonNode'
    AdapterStatusColor:
      type: string
      description: The externally visible color of a Nevsky (v2) protocol adapter, derived purely from its state machine state.
      enum:
        - GREY_STOPPED
        - YELLOW_CONNECTING
        - GREEN_CONNECTED
        - AMBER_RETRYING
        - YELLOW_STOPPING
        - RED_ERROR
    AdapterMachineState:
      type: string
      description: The Nevsky (v2) protocol adapter state machine state.
      enum:
        - STOPPED
        - WAITING_FOR_STARTED
        - WAITING_FOR_CONNECTED
        - WAITING_FOR_VERIFICATION
        - CONNECTED
        - WAITING_FOR_CONNECTION_RETRY
        - WAITING_FOR_DISCONNECTED
        - WAITING_FOR_DISCONNECTED_BEFORE_RECONNECT
        - WAITING_FOR_STOPPED
        - ERROR
    TagSummary:
      type: object
      description: A summary of a Nevsky adapter's tags, counted by externally visible status.
      properties:
        total:
          type: integer
          format: int32
          description: The total number of tags configured on the adapter.
        northboundAndSouthbound:
          type: integer
          format: int32
          description: The number of tags active on both directions.
        northboundOnly:
          type: integer
          format: int32
          description: The number of tags active northbound only.
        southboundOnly:
          type: integer
          format: int32
          description: The number of tags active southbound only.
        deactivated:
          type: integer
          format: int32
          description: The number of fully deactivated tags.
        error:
          type: integer
          format: int32
          description: The number of tags in error.
    AdapterStatus:
      type: object
      description: The runtime status of a Nevsky adapter — a pure function of the immutable snapshot the adapter wrapper publishes.
      required:
        - id
      properties:
        id:
          type: string
          description: The adapter instance id.
        color:
          $ref: '#/components/schemas/AdapterStatusColor'
        stateMachineState:
          $ref: '#/components/schemas/AdapterMachineState'
        northboundActivated:
          type: boolean
          description: Whether the northbound (read) direction is activated (the live goal).
        southboundActivated:
          type: boolean
          description: Whether the southbound (write) direction is activated (the live goal).
        tags:
          $ref: '#/components/schemas/TagSummary'
        message:
          type: string
          description: A human-readable message — the last error reason when in error.
        lastTransitionAt:
          type: string
          format: date-time
          description: The time of the last state machine transition.
    AdapterDefinition:
      type: object
      description: The read-only configured definition of a Nevsky adapter, as loaded from the externally-generated configuration section. The v2 API never writes configuration.
      required:
        - id
      properties:
        id:
          type: string
          description: The adapter instance id.
        protocolId:
          type: string
        configVersion:
          type: integer
          format: int32
        northboundActivated:
          type: boolean
          description: The configuration-declared northbound activation (the goal at startup).
        southboundActivated:
          type: boolean
          description: The configuration-declared southbound activation (the goal at startup).
        skipVerification:
          type: boolean
        watchdogTimeoutMillis:
          type: integer
          format: int64
        adapterConfiguration:
          $ref: '#/components/schemas/JsonNode'
    Error:
      type: object
      properties:
        detail:
          type: string
          description: Detailed contextual description of this error
        parameter:
          type: string
          description: The parameter causing the issue
      required:
        - detail
    ProblemDetails:
      type: object
      properties:
        code:
          type: string
          description: Correlation id
        detail:
          type: string
        errors:
          deprecated: true
          type: array
          items:
            $ref: '#/components/schemas/Error'
        status:
          type: integer
          format: int32
        title:
          type: string
        type:
          type: string
          format: uri
      required:
        - title
    AdapterDirection:
      type: string
      description: A protocol adapter communication direction.
      enum:
        - NORTHBOUND
        - SOUTHBOUND
        - BOTH
    AdapterActivation:
      type: object
      description: A request to activate or deactivate a direction of an adapter. This is a live-goal command that is never persisted; after a restart the configuration-declared activation applies again.
      required:
        - direction
        - activated
      properties:
        direction:
          $ref: '#/components/schemas/AdapterDirection'
        activated:
          type: boolean
          description: Whether to activate (true) or deactivate (false) the direction.
    AccessTriState:
      type: string
      description: A three-valued access capability of a node.
      enum:
        - 'YES'
        - 'NO'
        - WILL_NOT_USE
    AccessFlags:
      type: object
      description: The declared access capabilities of a node.
      properties:
        readable:
          $ref: '#/components/schemas/AccessTriState'
        writable:
          $ref: '#/components/schemas/AccessTriState'
        pollable:
          $ref: '#/components/schemas/AccessTriState'
        subscribable:
          $ref: '#/components/schemas/AccessTriState'
    TagStatus:
      type: string
      description: The externally visible status of a tag, with a distinct value per direction-activation combination, plus deactivated and error.
      enum:
        - NORTHBOUND_AND_SOUTHBOUND
        - NORTHBOUND_ONLY
        - SOUTHBOUND_ONLY
        - DEACTIVATED
        - ERROR
    NodeTagPair:
      type: object
      description: A Node/Tag pair as configured, with its read-only activation flags (persisted preferences from the configuration section) and its derived runtime status.
      required:
        - tagName
        - nodeString
      properties:
        tagName:
          type: string
          description: The tag name.
        nodeString:
          type: string
          description: Opaque JSON node definition, stored as-is.
        readActivated:
          type: boolean
          readOnly: true
          description: Persisted read-aspect activation preference from the configuration section.
        writeActivated:
          type: boolean
          readOnly: true
          description: Persisted write-aspect activation preference from the configuration section.
        pollable:
          type: boolean
          readOnly: true
        subscribable:
          type: boolean
          readOnly: true
        access:
          $ref: '#/components/schemas/AccessFlags'
        schema:
          $ref: '#/components/schemas/JsonNode'
        status:
          $ref: '#/components/schemas/TagStatus'
    TagStatusDetail:
      type: object
      description: A tag's status plus per-aspect detail — states, counters, and the last failure reason.
      required:
        - tagName
      properties:
        tagName:
          type: string
        status:
          $ref: '#/components/schemas/TagStatus'
        readAspectState:
          type: string
          description: The read aspect's current state name (for example WAITING_FOR_POLL_INTERVAL).
        writeAspectState:
          type: string
          description: The write aspect's current state name.
        readActivated:
          type: boolean
        writeActivated:
          type: boolean
        readUsed:
          type: boolean
        writeUsed:
          type: boolean
        failureCount:
          type: integer
          format: int32
        lastFailureReason:
          type: string
        lastTransitionAt:
          type: string
          format: date-time
    SkippedTagRetry:
      type: object
      description: A tag whose retry was skipped, with the machine-readable reason.
      properties:
        tagName:
          type: string
        reason:
          type: string
          description: Why the retry was skipped (for example "aspect is not in an error state").
    TagRetryResult:
      type: object
      description: The outcome of a tag retry request.
      properties:
        accepted:
          type: array
          description: The tags whose retry was accepted (at least one aspect re-verifies).
          items:
            type: string
        skipped:
          type: array
          description: The tags whose retry was skipped, each with the reason.
          items:
            $ref: '#/components/schemas/SkippedTagRetry'
    TagRetryRequest:
      type: object
      description: A request to retry permanently-failed tags (runtime-only; never touches configuration). Omit tagNames to retry every permanently-failed tag on the adapter.
      properties:
        tagNames:
          type: array
          description: The tags to retry; omit for all permanently-failed tags.
          items:
            type: string
    MappingStatus:
      type: string
      description: The derived runtime status of a mapping.
      enum:
        - ACTIVE
        - DEACTIVATED_BY_TAG
        - BLOCKED_BY_TAG_ERROR
        - BLOCKED_BY_ADAPTER
    MappingBlockedBy:
      type: object
      description: The root cause of a mapping that is not ACTIVE.
      properties:
        adapterId:
          type: string
        direction:
          $ref: '#/components/schemas/AdapterDirection'
        tagName:
          type: string
    Mapping:
      type: object
      description: A mapping (northbound or southbound) with its derived runtime status.
      properties:
        tagName:
          type: string
        topic:
          type: string
        status:
          $ref: '#/components/schemas/MappingStatus'
        blockedBy:
          $ref: '#/components/schemas/MappingBlockedBy'
    BrowseCommand:
      type: object
      description: A request to browse a device's address space below a filter node.
      properties:
        nodeString:
          type: string
          description: The JSON node definition to browse below; omit or pass an empty object to browse from the root of the device's address space.
    BrowseResultEntry:
      type: object
      description: One entry of a browse result.
      properties:
        nodeId:
          type: string
          description: The minimum identity of the discovered node.
        nodeString:
          type: string
          description: The full JSON node definition of the discovered node.
        type:
          type: string
          description: The kind of node.
          enum:
            - FOLDER
            - OBJECT
            - VALUE
        selectable:
          type: boolean
          description: Whether the node can be selected as a tag's node definition.
    BrowseResult:
      type: object
      description: The result of a browse — the enumerated child nodes.
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/BrowseResultEntry'
